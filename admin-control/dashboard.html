<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabesque Admin Control Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian: '#1a1a1a',
            panel: '#242424',
            field: '#2e2e2e',
            accent: '#d4a853',
            accentSoft: 'rgba(212, 168, 83, 0.18)',
            ink: '#f5f1e8',
            muted: '#a1a1aa',
            line: 'rgba(255,255,255,0.08)',
            danger: '#f87171'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Playfair Display', 'serif']
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(212,168,83,0.18), 0 20px 40px rgba(0,0,0,0.28)'
          },
          backgroundImage: {
            grain: 'radial-gradient(circle at top, rgba(212,168,83,0.14), transparent 34%), linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0))'
          }
        }
      }
    };
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(212, 168, 83, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(212, 168, 83, 0.08), transparent 24%),
        #1a1a1a;
      color: #f5f1e8;
      font-family: Inter, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-thumb {
      background: rgba(212, 168, 83, 0.28);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="/admin/app.js"></script>
</body>
</html>
